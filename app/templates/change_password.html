{% extends "app_shell.html" %}

{% block topbar_title %}修改密码{% endblock %}

{% block topbar_copy %}更新当前登录账号的访问密码。{% endblock %}

{% block page_content %}
<main class="content-stack content-wide">
    <section class="section-card" style="max-width: 560px;">
        <div class="section-header section-header-tight">
            <h1>修改密码</h1>
        </div>
        <form action="/change-password" method="post" class="stack-form">
            <label>
                <span>当前密码</span>
                <input class="form-control" type="password" name="current_password" placeholder="请输入当前密码" required>
            </label>
            <label>
                <span>新密码</span>
                <input class="form-control" type="password" name="new_password" placeholder="请输入新密码" required>
            </label>
            <label>
                <span>确认新密码</span>
                <input class="form-control" type="password" name="confirm_password" placeholder="请再次输入新密码" required>
            </label>
            {% if error_message %}
            <p class="error-message">{{ error_message }}</p>
            {% endif %}
            {% if success_message %}
            <p class="success-message">{{ success_message }}</p>
            {% endif %}
            <div class="topbar-actions" style="justify-content: flex-start;">
                <button type="submit" class="primary-button btn btn-primary">保存新密码</button>
                <a href="/dashboard" class="ghost-button btn btn-outline-secondary">返回</a>
            </div>
        </form>
    </section>
</main>
{% endblock %}
